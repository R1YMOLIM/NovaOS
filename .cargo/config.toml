# .cargo/config.toml
[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
linker = "rust-lld"
rustflags = [
    "-C", "link-arg=-T.cargo/linker.ld",
    "-C", "relocation-model=pic",
    "-C", "link-arg=-z",
    "-C", "link-arg=norelro",
    "-C", "link-arg=--oformat=binary",
    "-C", "panic=abort",
]

[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"] 
